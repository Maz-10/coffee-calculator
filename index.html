<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>حاسبة القهوة · Coffee Brewing Calculator</title>
<style>
  @font-face {
    font-family: 'Thmanyah';
    src: url('assets/thmanyah.otf') format('opentype');
    font-weight: 100 900;
    font-display: swap;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  /* Dark espresso base on the root canvas: any safe-area, notch, or overscroll gap
     shows this tone instead of white — accepted by every mobile browser. */
  html, body { height: 100%; background: #160c05; }
  body {
    font-family: 'Thmanyah', 'Segoe UI', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #4a3527;
  }
  button { font-family: inherit; }
  input { font-family: inherit; }
  input::placeholder { color: rgba(74,53,39,0.32); }

  @keyframes steamRise {
    0%   { opacity: 0; transform: translateY(4px) scaleY(0.7); }
    25%  { opacity: 0.55; }
    100% { opacity: 0; transform: translateY(-26px) scaleY(1.4); }
  }
  /* opacity-only so it never competes with the JS fit-to-viewport scale transform */
  @keyframes floatIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ---- Scene ---- */
  /* Full-bleed backdrop: the café photo fills the LARGEST viewport, so it keeps
     going behind the browser's top/bottom toolbars — no solid band, just the image
     continuing edge to edge. */
  .backdrop {
    position: fixed; top: 0; left: 0; right: 0;
    height: 100vh;          /* iOS treats 100vh as the tall (large) viewport — good fallback */
    height: 100lvh;         /* explicit largest viewport: extends behind the toolbars */
    overflow: hidden;
    background: #160c05;
    z-index: 0;
  }
  .scene {
    position: fixed; top: 0; left: 0; right: 0;
    height: 100vh;          /* fallback */
    height: 100dvh;         /* visible viewport — keeps the card centered in what's actually on screen */
    display: flex; align-items: center; justify-content: center;
    /* keep the card clear of the notch / home indicator without leaving white bands */
    padding: max(20px, env(safe-area-inset-top)) 20px max(20px, env(safe-area-inset-bottom));
    z-index: 1;
  }
  .bg {
    position: absolute; inset: -20px;
    background-image: url('assets/cafe.jpg');
    background-size: cover; background-position: 62% center;
    /* brighter + sharper so the café photo reads clearly and elegantly */
    filter: blur(1px) brightness(0.78) saturate(1.16) contrast(1.04);
    transform: scale(1.06);
  }
  .veil {
    position: absolute; inset: 0;
    /* lighter wash so the image stays visible across the whole scene */
    background: linear-gradient(160deg, rgba(40,24,14,0.30) 0%, rgba(28,16,9,0.40) 55%, rgba(20,11,6,0.52) 100%);
  }
  /* Elegant framing: the café photo shows through the top and bottom margins,
     gently deepened at the very edges so the card floats over a clean frame. */
  .vignette {
    position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(to bottom,
      rgba(14,8,3,0.60) 0%, rgba(14,8,3,0.12) 14%,
      rgba(14,8,3,0) 34%, rgba(14,8,3,0) 66%,
      rgba(14,8,3,0.12) 86%, rgba(14,8,3,0.60) 100%);
  }
  .bloom {
    position: absolute; inset: 0;
    background: radial-gradient(120% 80% at 30% 12%, rgba(255,214,150,0.18) 0%, rgba(255,214,150,0) 46%);
  }

  /* ---- Card ----
     Fixed size: the card is always min-height 818px (covers the tallest state at
     every phone width), so selecting any option never changes its size — the free
     space is redistributed internally instead. A JS fit-to-viewport pass (fitCard)
     scales it to the visible area — even with the keyboard up. */
  .card {
    position: relative;
    width: min(90vw, 400px);
    min-height: 818px;
    /* fixed height, with the free space spread evenly between all sections
       so no single gap builds up between the options and the input */
    display: flex; flex-direction: column; justify-content: space-between;
    background: rgba(246,239,229,0.42);
    backdrop-filter: blur(26px) saturate(1.35);
    -webkit-backdrop-filter: blur(26px) saturate(1.35);
    border: 1px solid rgba(255,251,244,0.45);
    border-radius: 28px;
    box-shadow: 0 34px 90px rgba(28,16,8,0.5), inset 0 1px 0 rgba(255,255,255,0.4);
    padding: 18px 20px 20px;
    animation: floatIn 0.7s ease both;
    color: #4a3527;
    transform-origin: center center;
    will-change: transform;
  }
  /* smooth the one-time slide when the keyboard opens/closes (added after load so
     the initial fit doesn't animate) */
  .card.smooth { transition: transform 0.28s cubic-bezier(0.2,0.7,0.25,1); }

  /* ---- Language toggle ---- */
  .lang-row { display: flex; justify-content: center; margin-bottom: 12px; }
  .lang-group {
    display: inline-flex; gap: 4px;
    background: rgba(74,53,39,0.09);
    border-radius: 999px; padding: 4px;
    direction: rtl; /* fixed order: العربية on the right, English on the left — never reorders with page dir */
  }
  .lang-btn {
    border: none; cursor: pointer; border-radius: 999px;
    padding: 6px 16px; font-size: 13px; font-weight: 700;
    transition: all 0.25s ease;
  }
  .lang-btn.on {
    background: #3a281c; color: #f4ece0;
    box-shadow: 0 4px 12px rgba(28,16,8,0.28);
  }
  .lang-btn.off { background: transparent; color: rgba(74,53,39,0.6); }

  /* ---- Header ---- */
  .header { text-align: center; margin-bottom: 14px; }
  /* reserve two lines of height so the card is the SAME size in Arabic (1 line)
     and English (2 lines) — text stays vertically centred either way */
  .title {
    font-weight: 700; line-height: 1.12; color: #3a281c;
    min-height: 66px; display: flex; align-items: center; justify-content: center;
  }
  .subtitle { font-size: 12.5px; color: rgba(74,53,39,0.6); margin-top: 6px; font-weight: 500; }

  /* ---- Tabs ---- */
  .tabs {
    display: flex; gap: 6px;
    background: rgba(74,53,39,0.08);
    border-radius: 16px; padding: 5px; margin-bottom: 14px;
  }
  .tab {
    flex: 1; border: none; cursor: pointer; border-radius: 12px;
    padding: 6px 4px; transition: all 0.25s ease;
    font-size: 13.5px; font-weight: 700; line-height: 1.2;
    /* fixed height so a single-line Arabic tab matches a wrapped English tab */
    min-height: 48px; display: flex; align-items: center; justify-content: center; text-align: center;
  }
  .tab.on {
    background: #3a281c; color: #f4ece0;
    box-shadow: 0 6px 16px rgba(28,16,8,0.28);
  }
  .tab.off { background: transparent; color: rgba(74,53,39,0.62); }

  /* ---- Brew methods ---- */
  .brew-block { margin-bottom: 14px; }
  .section-label { font-size: 12px; color: rgba(74,53,39,0.62); font-weight: 600; margin-bottom: 8px; }
  .ratios { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .pill {
    display: flex; align-items: center; justify-content: space-between; gap: 6px;
    cursor: pointer; border-radius: 14px; padding: 10px 14px;
    transition: all 0.25s ease;
  }
  /* V60 — the headline choice: spans the full width and reads larger.
     The name is centred in the frame; the ratio is pinned to the edge. */
  .pill.featured {
    grid-column: 1 / -1; padding: 15px 16px; border-radius: 16px;
    position: relative; justify-content: center;
  }
  .pill.featured .pill-name { font-size: 17px; }
  .pill.featured .pill-ratio {
    font-size: 13px;
    position: absolute; top: 50%; transform: translateY(-50%);
  }
  /* ratio sits on the left in Arabic (RTL), on the right in English (LTR) */
  [dir="rtl"] .pill.featured .pill-ratio { left: 16px; }
  [dir="ltr"] .pill.featured .pill-ratio { right: 16px; }
  .pill.on {
    background: rgba(193,154,91,0.22);
    border: 1.5px solid #c19a5b; color: #3a281c;
    box-shadow: 0 4px 12px rgba(193,154,91,0.2);
  }
  .pill.featured.on { box-shadow: 0 8px 22px rgba(193,154,91,0.32); }
  .pill.off {
    background: rgba(255,252,247,0.3);
    border: 1.5px solid rgba(74,53,39,0.14);
    color: rgba(74,53,39,0.72);
  }
  .pill-name { font-size: 13.5px; font-weight: 700; }
  .pill-ratio { font-size: 12px; font-weight: 600; direction: ltr; opacity: 0.85; }

  /* ---- V60 ratio sub-selector (shown only when V60 is chosen) ---- */
  .v60-options { margin-top: 10px; }
  .v60-label { font-size: 12px; color: rgba(74,53,39,0.62); font-weight: 600; margin-bottom: 6px; }
  .v60-ratios { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .v60-pill {
    cursor: pointer; border-radius: 12px; padding: 8px 4px; text-align: center;
    font-size: 13px; font-weight: 700; direction: ltr; transition: all 0.25s ease;
  }
  .v60-pill.on {
    background: rgba(193,154,91,0.22);
    border: 1.5px solid #c19a5b; color: #3a281c;
    box-shadow: 0 4px 12px rgba(193,154,91,0.2);
  }
  .v60-pill.off {
    background: rgba(255,252,247,0.3);
    border: 1.5px solid rgba(74,53,39,0.14);
    color: rgba(74,53,39,0.72);
  }
  .v60-cups { grid-template-columns: repeat(2, 1fr); }
  .v60-cup-pill { display: flex; flex-direction: column; gap: 2px; padding: 7px 4px; }
  .cup-name { font-size: 13px; font-weight: 700; }
  .cup-grams { font-size: 11px; font-weight: 600; opacity: 0.72; direction: ltr; }

  /* ---- Input ---- */
  .input-block {
    background: rgba(255,252,247,0.4);
    border: 1px solid rgba(255,255,255,0.45);
    border-radius: 18px; padding: 12px 16px; margin-bottom: 14px;
  }
  .input-label { display: block; font-size: 12.5px; color: rgba(74,53,39,0.7); font-weight: 600; margin-bottom: 4px; }
  .input-line {
    display: flex; align-items: baseline; gap: 8px;
    border-bottom: 2px solid rgba(193,154,91,0.55); padding-bottom: 4px;
  }
  .input-field {
    flex: 1; min-width: 0; border: none; background: transparent; outline: none;
    font-size: 34px; font-weight: 700; color: #3a281c;
    direction: ltr; letter-spacing: -0.5px;
  }
  .input-suffix { font-size: 15px; font-weight: 600; color: #a17f4c; white-space: nowrap; }

  /* ---- Result panel ---- */
  .result {
    position: relative;
    background: linear-gradient(165deg, rgba(58,40,28,0.96), rgba(42,28,18,0.98));
    border-radius: 22px; padding: 18px 18px 18px; text-align: center;
    box-shadow: 0 16px 40px rgba(28,16,8,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
    overflow: hidden;
  }
  .steam {
    position: absolute; top: 10px; left: 0; right: 0;
    display: flex; justify-content: center; gap: 10px; pointer-events: none;
  }
  .wisp {
    display: block; width: 5px; height: 20px; border-radius: 3px;
    background: linear-gradient(rgba(240,224,204,0.55), rgba(240,224,204,0));
    filter: blur(1.5px);
  }

  /* single mode */
  .main-label { font-size: 14px; color: rgba(240,224,204,0.62); font-weight: 600; margin-bottom: 4px; margin-top: 2px; }
  .main-line { text-align: center; white-space: nowrap; line-height: 0.95; }
  .main-num { font-size: clamp(46px, 14vw, 64px); font-weight: 700; color: #f4ecdf; letter-spacing: -2px; vertical-align: baseline; }
  .main-unit { font-size: 16px; color: #d9ae6f; font-weight: 600; margin-inline-start: 8px; vertical-align: baseline; }
  .sub-line { font-size: 12px; color: rgba(240,224,204,0.48); margin-top: 10px; line-height: 1.5; }

  /* drinkers mode */
  .split { display: flex; align-items: stretch; justify-content: center; gap: 4px; margin-top: 4px; }
  .split-col { flex: 1; }
  .split-label { font-size: 12px; color: rgba(240,224,204,0.62); font-weight: 600; margin-bottom: 5px; }
  .split-num { font-size: clamp(34px, 11vw, 48px); font-weight: 700; color: #f2e7d8; line-height: 1; letter-spacing: -1px; }
  .split-unit { font-size: 13px; color: #d9ae6f; font-weight: 600; margin-top: 4px; }
  .split-divider {
    width: 1px; margin: 4px 6px;
    background: linear-gradient(rgba(217,174,111,0), rgba(217,174,111,0.4), rgba(217,174,111,0));
  }
  .drinkers-note { font-size: 12px; color: rgba(240,224,204,0.5); margin-top: 10px; line-height: 1.5; }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="backdrop">
  <div class="bg"></div>
  <div class="veil"></div>
  <div class="bloom"></div>
  <div class="vignette"></div>
</div>

<div class="scene">

  <div class="card" id="card">

    <div class="lang-row">
      <div class="lang-group">
        <button class="lang-btn" id="langAr">العربية</button>
        <button class="lang-btn" id="langEn">English</button>
      </div>
    </div>

    <div class="header">
      <h1 class="title" id="title"></h1>
      <p class="subtitle" id="subtitle"></p>
    </div>

    <div class="tabs" id="tabs"></div>

    <div class="brew-block">
      <div class="section-label" id="brewLabel"></div>
      <div class="ratios" id="ratios"></div>
      <div class="v60-options hidden" id="v60Options">
        <div class="v60-label" id="v60Label"></div>
        <div class="v60-ratios" id="v60Ratios"></div>
      </div>
      <div class="v60-options hidden" id="v60CupOptions">
        <div class="v60-label" id="v60CupLabel"></div>
        <div class="v60-ratios v60-cups" id="v60Cups"></div>
      </div>
    </div>

    <div class="input-block">
      <label class="input-label" id="inputLabel" for="inputField"></label>
      <div class="input-line">
        <input class="input-field" id="inputField" type="text" inputmode="decimal" autocomplete="off">
        <span class="input-suffix" id="inputSuffix"></span>
      </div>
    </div>

    <div class="result">
      <div class="steam" id="steam"></div>

      <!-- drinkers mode -->
      <div id="drinkersView" class="hidden">
        <div class="split">
          <div class="split-col">
            <div class="split-label" id="coffeeLabel"></div>
            <div class="split-num" id="resultCoffee"></div>
            <div class="split-unit" id="coffeeUnit"></div>
          </div>
          <div class="split-divider"></div>
          <div class="split-col">
            <div class="split-label" id="waterLabel"></div>
            <div class="split-num" id="resultWater"></div>
            <div class="split-unit" id="waterUnit"></div>
          </div>
        </div>
        <div class="drinkers-note" id="drinkersNote"></div>
      </div>

      <!-- single mode -->
      <div id="singleView">
        <div class="main-label" id="mainLabel"></div>
        <div class="main-line">
          <span class="main-num" id="resultMain"></span>
          <span class="main-unit" id="mainUnit"></span>
        </div>
        <div class="sub-line" id="subLine"></div>
      </div>
    </div>

  </div>
</div>

<script>
(() => {
  "use strict";

  // ---- Configurable defaults (exposed as tweaks in the original design) ----
  const DEFAULT_LANGUAGE = 'ar';   // 'ar' | 'en'
  const SHOW_STEAM = true;

  // V60 is featured (full width, top); Espresso sits below it, Cold Brew to its left (RTL)
  const RATIO_DEFS = [
    { key: 'v60',      ar: 'V60',        en: 'V60',       ratio: 16, cup: 180 },
    { key: 'espresso', ar: 'إسبريسو',    en: 'Espresso',  ratio: 2,  cup: 40  },
    { key: 'cold',     ar: 'قهوة باردة', en: 'Cold Brew', ratio: 15, cup: 250 },
  ];

  // V60 can be dialled to 1:15, 1:16 or 1:17 — default 1:16
  const V60_RATIOS = [15, 16, 17];
  const DEFAULT_V60_RATIO = 16;

  // V60 cup size (grams of water per cup), used only in the "number of cups" mode
  const V60_CUPS = [
    { grams: 180, ar: 'كوب متوسّط', en: 'Medium cup' },
    { grams: 240, ar: 'كوب كبير',  en: 'Large cup'  },
  ];
  const DEFAULT_V60_CUP = 180;

  const state = {
    mode: 'coffee', ratioKey: 'v60', raw: '', lang: DEFAULT_LANGUAGE,
    v60Ratio: DEFAULT_V60_RATIO, v60Cup: DEFAULT_V60_CUP,
  };

  // ---- Numeral helpers ----
  // Western digits -> Arabic-Indic for display (Arabic mode only)
  function loc(s) {
    if (state.lang === 'ar') {
      const m = { '0':'٠','1':'١','2':'٢','3':'٣','4':'٤','5':'٥','6':'٦','7':'٧','8':'٨','9':'٩' };
      return String(s).replace(/[0-9]/g, d => m[d]);
    }
    return String(s);
  }
  // Arabic-Indic / Persian digits -> Western for math
  function toWestern(s) {
    return String(s)
      .replace(/[٠-٩]/g, d => '٠١٢٣٤٥٦٧٨٩'.indexOf(d))
      .replace(/[۰-۹]/g, d => '۰۱۲۳۴۵۶۷۸۹'.indexOf(d))
      .replace(/٫/g, '.').replace(/،/g, '');
  }
  function fmt(n) {
    if (!isFinite(n) || n <= 0) return '';
    const r = Math.round(n * 10) / 10;
    return Number.isInteger(r) ? String(r) : r.toFixed(1);
  }
  function num(n) { return loc(fmt(n)); }

  // ---- Arabic number–noun agreement (قواعد العدد والمعدود) for "كوب" ----
  //  1 → كوب · 2 → كوبان · 3–10 → أكواب · 11–99 → كوبًا · 100.. → كوب
  //  (rule keys off the last two digits; non-integers fall back to the singular)
  function cupWordAr(n) {
    if (!(n > 0) || !Number.isInteger(n)) return 'كوب';
    const two = n % 100;
    if (two === 1) return 'كوب';
    if (two === 2) return 'كوبان';
    if (two >= 3 && two <= 10) return 'أكواب';
    if (two >= 11 && two <= 99) return 'كوبًا';
    return 'كوب'; // multiples of 100
  }
  function cupWordEn(n) { return n === 1 ? 'cup' : 'cups'; }
  function cupWord(n) { return state.lang === 'ar' ? cupWordAr(n) : cupWordEn(n); }

  const el = (id) => document.getElementById(id);

  // ---- Build static child lists once ----
  function buildTabs() {
    const container = el('tabs');
    container.innerHTML = '';
    ['coffee', 'water', 'drinkers'].forEach(key => {
      const b = document.createElement('button');
      b.className = 'tab';
      b.dataset.key = key;
      b.addEventListener('click', () => { state.mode = key; state.raw = ''; el('inputField').value = ''; el('inputField').blur(); render(); });
      container.appendChild(b);
    });
  }
  function buildRatios() {
    const container = el('ratios');
    container.innerHTML = '';
    RATIO_DEFS.forEach(d => {
      const b = document.createElement('button');
      b.className = 'pill' + (d.key === 'v60' ? ' featured' : '');
      b.dataset.key = d.key;
      const name = document.createElement('span'); name.className = 'pill-name';
      const ratio = document.createElement('span'); ratio.className = 'pill-ratio';
      b.appendChild(name); b.appendChild(ratio);
      b.addEventListener('click', () => { state.ratioKey = d.key; render(); });
      container.appendChild(b);
    });
  }
  function buildV60() {
    const container = el('v60Ratios');
    container.innerHTML = '';
    V60_RATIOS.forEach(r => {
      const b = document.createElement('button');
      b.className = 'v60-pill';
      b.dataset.ratio = r;
      b.addEventListener('click', () => { state.v60Ratio = r; render(); });
      container.appendChild(b);
    });
  }
  function buildV60Cups() {
    const container = el('v60Cups');
    container.innerHTML = '';
    V60_CUPS.forEach(c => {
      const b = document.createElement('button');
      b.className = 'v60-pill v60-cup-pill';
      b.dataset.grams = c.grams;
      const name = document.createElement('span'); name.className = 'cup-name';
      const grams = document.createElement('span'); grams.className = 'cup-grams';
      b.appendChild(name); b.appendChild(grams);
      b.addEventListener('click', () => { state.v60Cup = c.grams; render(); });
      container.appendChild(b);
    });
  }
  function buildSteam() {
    const container = el('steam');
    container.innerHTML = '';
    if (!SHOW_STEAM) return;
    [0, 1, 2].forEach(i => {
      const s = document.createElement('span');
      s.className = 'wisp';
      s.style.animation = `steamRise ${2.6 + i * 0.4}s ease-in-out ${i * 0.5}s infinite`;
      container.appendChild(s);
    });
  }

  // ---- Render ----
  function render() {
    const ar = state.lang === 'ar';
    const t = (a, e) => (ar ? a : e);

    document.documentElement.lang = ar ? 'ar' : 'en';
    document.documentElement.dir = ar ? 'rtl' : 'ltr';
    el('card').dir = ar ? 'rtl' : 'ltr';

    const active = RATIO_DEFS.find(d => d.key === state.ratioKey) || RATIO_DEFS[0];
    const isV60 = state.ratioKey === 'v60';
    const ratio = isV60 ? state.v60Ratio : active.ratio;
    const cup = isV60 ? state.v60Cup : active.cup;
    const styleName = ar ? active.ar : active.en;
    const ratioStr = loc('1:' + ratio);

    const n = parseFloat(toWestern(state.raw)) || 0;
    let coffee = 0, water = 0, drinkers = 0;
    if (state.mode === 'coffee') { coffee = n; water = n * ratio; }
    else if (state.mode === 'water') { water = n; coffee = n / ratio; }
    else { drinkers = n; water = n * cup; coffee = water / ratio; }

    const hasValue = n > 0;

    // language toggle
    el('langAr').className = 'lang-btn ' + (ar ? 'on' : 'off');
    el('langEn').className = 'lang-btn ' + (ar ? 'off' : 'on');

    // header (Arabic keeps letters joined: no letter-spacing)
    el('title').textContent = t('حاسبـة القهـوة', 'Coffee Brewing Calculator');
    el('title').style.fontSize = ar ? '32px' : '28px';
    el('title').style.letterSpacing = ar ? '0' : '-0.5px';
    el('subtitle').textContent = t('اضمن النسبة المثاليّـة', 'Dial in your perfect ratio');
    el('subtitle').style.letterSpacing = ar ? '0' : '2px';

    // tabs
    const tabLabels = {
      coffee:   t('قهوة', 'Coffee'),
      water:    t('ماء', 'Water'),
      drinkers: t('عدد الأكواب', 'Number of Cups'),
    };
    el('tabs').querySelectorAll('.tab').forEach(b => {
      const key = b.dataset.key;
      b.textContent = tabLabels[key];
      b.className = 'tab ' + (key === state.mode ? 'on' : 'off');
    });

    // brew label + ratio pills
    el('brewLabel').textContent = t('طريقة التحضير', 'Brew method');
    el('brewLabel').style.letterSpacing = ar ? '0' : '0.5px';
    el('ratios').querySelectorAll('.pill').forEach(b => {
      const d = RATIO_DEFS.find(x => x.key === b.dataset.key);
      const shownRatio = d.key === 'v60' ? state.v60Ratio : d.ratio;
      b.querySelector('.pill-name').textContent = ar ? d.ar : d.en;
      b.querySelector('.pill-ratio').textContent = loc('1:' + shownRatio);
      b.className = 'pill' + (d.key === 'v60' ? ' featured' : '') + ' ' + (d.key === state.ratioKey ? 'on' : 'off');
    });

    // V60 ratio sub-selector — only visible while V60 is the chosen method
    el('v60Options').classList.toggle('hidden', state.ratioKey !== 'v60');
    el('v60Label').textContent = t('نسبة V60', 'V60 ratio');
    el('v60Label').style.letterSpacing = ar ? '0' : '0.5px';
    el('v60Ratios').querySelectorAll('.v60-pill').forEach(b => {
      const r = parseInt(b.dataset.ratio, 10);
      b.textContent = loc('1:' + r);
      b.className = 'v60-pill ' + (r === state.v60Ratio ? 'on' : 'off');
    });

    // V60 cup-size sub-selector — only in the "number of cups" mode with V60
    const showCups = isV60 && state.mode === 'drinkers';
    el('v60CupOptions').classList.toggle('hidden', !showCups);
    el('v60CupLabel').textContent = t('حجم الكوب', 'Cup size');
    el('v60CupLabel').style.letterSpacing = ar ? '0' : '0.5px';
    el('v60Cups').querySelectorAll('.v60-cup-pill').forEach(b => {
      const g = parseInt(b.dataset.grams, 10);
      const def = V60_CUPS.find(c => c.grams === g);
      b.querySelector('.cup-name').textContent = ar ? def.ar : def.en;
      b.querySelector('.cup-grams').textContent = t(loc(g) + ' غرام', g + ' g');
      b.className = 'v60-pill v60-cup-pill ' + (g === state.v60Cup ? 'on' : 'off');
    });

    // input
    const inputMeta = {
      coffee:   { lbl: t('أدخل وزن القهوة', 'Enter coffee weight'), suffix: t('غرام', 'g'),    ph: loc('18')  },
      water:    { lbl: t('أدخل كمية الماء', 'Enter water amount'),  suffix: t('غرام', 'g'),    ph: loc('300') },
      drinkers: { lbl: t('عدد الأكواب', 'Number of cups'),          suffix: cupWord(n),        ph: loc('2')   },
    }[state.mode];
    el('inputLabel').textContent = inputMeta.lbl;
    el('inputSuffix').textContent = inputMeta.suffix;
    const field = el('inputField');
    field.placeholder = inputMeta.ph;
    field.style.textAlign = ar ? 'right' : 'left';
    if (field.value !== state.raw) field.value = state.raw;

    const unitLabel = t('غرام', 'grams');

    // result — drinkers vs single
    const isDrinkers = state.mode === 'drinkers';
    el('drinkersView').classList.toggle('hidden', !isDrinkers);
    el('singleView').classList.toggle('hidden', isDrinkers);

    if (isDrinkers) {
      el('coffeeLabel').textContent = t('القهوة', 'Coffee');
      el('waterLabel').textContent = t('الماء', 'Water');
      el('resultCoffee').textContent = num(coffee);
      el('resultWater').textContent = num(water);
      el('coffeeUnit').textContent = hasValue ? unitLabel : '';
      el('waterUnit').textContent = hasValue ? unitLabel : '';
      el('coffeeUnit').classList.toggle('hidden', !hasValue);
      el('waterUnit').classList.toggle('hidden', !hasValue);
      el('drinkersNote').textContent = hasValue
        ? t(`${num(drinkers)} ${cupWordAr(drinkers)} × ${loc(cup)} غرام لكل كوب · ${styleName} ${ratioStr}`,
            `${fmt(drinkers)} ${cupWordEn(drinkers)} × ${cup} g per cup · ${styleName} 1:${ratio}`)
        : t(`كل كوب ${loc(cup)} غرام (${styleName})`, `${cup} g per cup (${styleName})`);
    } else {
      const mainVal = state.mode === 'coffee' ? water : coffee;
      el('mainLabel').textContent = state.mode === 'coffee'
        ? t('قَدْر الماء', 'Water needed')
        : t('قَدْر القهوة', 'Coffee needed');
      el('resultMain').textContent = num(mainVal);
      el('mainUnit').textContent = hasValue ? unitLabel : '';
      el('mainUnit').classList.toggle('hidden', !hasValue);
      el('subLine').textContent = hasValue
        ? (state.mode === 'coffee'
            ? t(`من ${num(coffee)} غرام قهوة · ${styleName} ${ratioStr}`, `From ${fmt(coffee)} g coffee · ${styleName} 1:${ratio}`)
            : t(`من ${num(water)} غرام ماء · ${styleName} ${ratioStr}`, `From ${fmt(water)} g water · ${styleName} 1:${ratio}`))
        : t('بالعافيـة', 'Enter a number to see the result');
    }

    // keep the whole card on screen after any content change
    fitCard();
  }

  // ---- Fit-to-viewport ----
  // The card is a FIXED size, so its scale is computed ONCE from the full layout
  // viewport and then FROZEN while the input is focused. The on-screen keyboard
  // (which shrinks visualViewport, not the layout viewport) therefore never makes
  // the card grow or shrink — no jitter. While focused we only translate the card
  // upward so the input + result stay visible above the keyboard.
  const CARD_H = 818;                            // the card's fixed height
  let baseScale = 1;
  function fitCard() {
    const card = el('card');
    const scene = document.querySelector('.scene');
    const cs = getComputedStyle(scene);
    const padY = (parseFloat(cs.paddingTop) || 0) + (parseFloat(cs.paddingBottom) || 0);
    const padX = (parseFloat(cs.paddingLeft) || 0) + (parseFloat(cs.paddingRight) || 0);
    const H = CARD_H;
    const W = Math.min(window.innerWidth * 0.9, 400);   // matches CSS width: min(90vw,400px)
    const focused = document.activeElement === el('inputField');

    // Recompute the scale only when NOT focused; keep it frozen while typing so the
    // size stays perfectly constant as the keyboard animates in and out.
    if (!focused) {
      const fullH = scene.clientHeight - padY;   // scene is 100dvh — independent of the keyboard
      const fullW = scene.clientWidth - padX;
      baseScale = Math.min(1, fullH / H, fullW / W);
    }

    let ty = 0;
    const vv = window.visualViewport;
    if (focused && vv) {
      // pin the card's bottom just above the keyboard (translate only, no rescale)
      const V = scene.clientHeight;
      const Hs = H * baseScale;
      const visibleBottom = vv.height + (vv.offsetTop || 0);
      const over = ((V - Hs) / 2 + Hs) - (visibleBottom - 12);
      if (over > 0) ty = -over;
    }

    const parts = [];
    if (ty) parts.push('translateY(' + ty.toFixed(1) + 'px)');
    if (baseScale < 0.999) parts.push('scale(' + baseScale.toFixed(4) + ')');
    const tf = parts.length ? parts.join(' ') : 'none';
    if (card.style.transform !== tf) card.style.transform = tf;   // avoid redundant writes
  }
  function syncViewport() { fitCard(); }
  window.addEventListener('resize', syncViewport);
  window.addEventListener('orientationchange', () => setTimeout(syncViewport, 250));
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', syncViewport);
    window.visualViewport.addEventListener('scroll', syncViewport);
  }
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(syncViewport);

  // ---- Wiring ----
  el('langAr').addEventListener('click', () => { state.lang = 'ar'; render(); });
  el('langEn').addEventListener('click', () => { state.lang = 'en'; render(); });
  el('inputField').addEventListener('input', (e) => {
    const cleaned = e.target.value.replace(/[^0-9٠-٩۰-۹.٫]/g, '');
    state.raw = cleaned;
    if (e.target.value !== cleaned) e.target.value = cleaned;
    render();
  });
  // re-fit when the keyboard opens/closes (some browsers don't fire visualViewport events)
  el('inputField').addEventListener('focus', () => { fitCard(); setTimeout(syncViewport, 300); });
  el('inputField').addEventListener('blur',  () => setTimeout(syncViewport, 300));

  buildTabs();
  buildRatios();
  buildV60();
  buildV60Cups();
  buildSteam();
  render();
  fitCard();
  requestAnimationFrame(() => el('card').classList.add('smooth'));
})();
</script>
</body>
</html>
